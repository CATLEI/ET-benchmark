# WBP + SIRT hybrid benchmark (master prep/eval, remote algorithm containers)
# -------------------------------------------------------------------------
# Usage:
#   et-dflow benchmark configs/wbp_remote_benchmark.yaml --output-dir ./results
#
# Parallel: all dataset×algorithm steps share one dflow Steps row; workflow.parallelism
# caps concurrent pods (2 datasets × 2 algorithms => max 4 here; tune for your quota).
#
# SIRT: pure CPU via parameters.backend: cpu_sirt and runtime_profiles below.
#
# Fill in real paths, images, and dflow/S3 endpoints before use.

datasets:
  T1_shrec21_model_0:
    path: "/personal/ET/data/benchmarks/T1-ET-GT/shrec21/model_0/tilt_series.hspy"
    format: "hyperspy"
    ground_truth_path: "/personal/ET/data/benchmarks/T1-ET-GT/shrec21/model_0/ground_truth.hspy"
    metadata:
      track: "T1-ET-GT"
      dataset_id: "shrec21"
      variant: "model_0"

  T1_shrec21_model_1:
    path: "/personal/ET/data/benchmarks/T1-ET-GT/shrec21/model_1/tilt_series.hspy"
    format: "hyperspy"
    ground_truth_path: "/personal/ET/data/benchmarks/T1-ET-GT/shrec21/model_1/ground_truth.hspy"
    metadata:
      track: "T1-ET-GT"
      dataset_id: "shrec21"
      variant: "model_1"

algorithms:
  wbp:
    enabled: true
    docker_image: "registry.dp.tech/dptech/dp/native/prod-23359/wbp:202603121021"
    parameters:
      filter_type: "ramp"
      filter_cutoff: 1.0
    resources:
      cpu: 2
      memory: "16Gi"
      gpu: false

  sirt:
    enabled: true
    docker_image: "registry.dp.tech/dptech/dp/native/prod-23359/sirt:20260321"
    parameters:
      backend: "cpu_sirt"
      iterations: 100
      relaxation_factor: 0.5
      dtype: "float32"
    resources:
      cpu: 32
      memory: "128Gi"
      gpu: false

evaluation:
  metrics:
    - "psnr"
    - "ssim"
    - "mse"

workflow:
  name: "t1-shrec21-benchmark"
  type: "baseline_benchmark"
  output_dir: "./results"

  # Hybrid: data prep and evaluation run on master; only algorithm runs remotely. No runner_image needed.
  execution_mode: "hybrid"
  # Cap concurrent algorithm pods (omit for no limit). 4 = full fan-out for 2 datasets × 2 algorithms.
  parallelism: 4
  # runner_image: "registry.example.com/et-dflow/runner:latest"  # required only when execution_mode is remote

# CPU-SIRT template (threads aligned with algorithms.sirt.resources.cpu when possible)
runtime_profiles:
  cpu_sirt_default:
    backend: "cpu_sirt"
    threads: 32
    iterations: 100
    dtype: "float32"

dataset_profiles:
  S:
    runtime_profile: "cpu_sirt_default"
  M:
    runtime_profile: "cpu_sirt_default"
  L:
    runtime_profile: "cpu_sirt_default"

policy:
  default_runtime_profile: "cpu_sirt_default"
  execution_policy:
    max_retries: 0
    oom_fallback_backend: "cpu_sirt"
    oom_fallback_overrides:
      use_native: false

dflow:
  mode: "remote"
  host: "http://workflows.deepmodeling.com"
  k8s_api_server: "http://workflows.deepmodeling.com"
  namespace: "argo"
  token: ""

  # Bohr 存储 (oss-bohrium + TiefblueClient)
  s3_repo_key: "oss-bohrium"
  s3_storage_client: "dflow.plugins.bohrium.TiefblueClient"
  bohrium_username: ""
  bohrium_password: ""
  bohrium_project_id: ""
