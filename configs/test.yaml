# Test environment configuration
# Overrides base.yaml settings for testing

dflow:
  host: "http://test-dflow:2746"
  namespace: "test"

logging:
  level: "INFO"
  format: "json"

cache:
  enabled: false  # Disable cache for tests

output:
  base_path: "./output/test"
  save_intermediate: true

resources:
  max_parallel_algorithms: 1  # Sequential for tests

