# Dataset configuration file
# Updated to support new directory structure (removed complexity field)

# Simulated datasets
test_dataset_v1:
  name: "Test Dataset"
  type: "simulated"
  version: "1.0"
  has_ground_truth: true
  path: "./data/datasets/simulated/test_dataset_v1"
  tilt_series: "raw/tilt_series.hspy"
  ground_truth: "ground_truth/volume.hspy"
  format: "hyperspy"
  metadata_path: "./data/datasets/simulated/test_dataset_v1/metadata.yaml"
  description: "Test dataset for ET-dflow framework"

# Example simulated datasets (update paths when datasets are added)
simulated_nanoparticle_v1:
