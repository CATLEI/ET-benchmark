  snr: 0.0  # Will be calculated
  contrast: 0.0  # Will be calculated
  missing_wedge_angle: 120.0  # Estimated from tilt_range
  data_completeness: 0.0  # Will be calculated
  resolution_estimate: 0.0  # Will be calculated

# Algorithm challenges (auto-calculated)
